function renderMaterialLeadHistory(){
  const leadId=v('matLead');
  const box=document.getElementById('materialLeadHistory');
  if(box) box.innerHTML = leadId ? materialHistoryHtml(leadId) : '<div class="empty">Selecione um lead.</div>';
}
function previewMaterialMessage(){
  const lead=leadBy(v('matLead'));
  const ids=[...document.querySelectorAll('.matCheck:checked')].map(x=>x.value);
  const box=document.getElementById('materialPreview');
  if(!box) return;
  if(!lead||!ids.length){ box.style.display='block'; box.innerHTML='<b>Prévia</b><p>Selecione lead e materiais.</p>'; return; }
  const names=ids.map(materialName).join(', ');
  const msg=`Olá ${lead.name}, seguem os materiais sobre o ${project().name}: ${names}. Posso te ajudar com uma simulação ou escolha de lote?`;
  box.style.display='block';
  box.innerHTML=`<b>Prévia da mensagem</b><p>${esc(msg)}</p>`;
}
function sendMaterialsFromForm(){
  ensureMaterialSendState();
  const lead=leadBy(v('matLead'));
  if(!lead) return toast('Selecione um lead.');
  const ids=[...document.querySelectorAll('.matCheck:checked')].map(x=>x.value);
  if(!ids.length) return toast('Selecione pelo menos um material.');
  const sentAtVal=v('matSentAt');
  const sentAt=sentAtVal?new Date(sentAtVal).toISOString():now();
  const send={id:uid('mat-send'),leadId:lead.id,projectId:project().id,materialIds:ids,channel:v('matChannel'),sentAt,byName:v('matBy')||((typeof authUser==='function'&&authUser()?.name)||'Equipe comercial'),note:v('matNote'),createdAt:now()};
  state.materialSends.push(send);
  lead.materialsSent = lead.materialsSent || [];
  lead.materialsSent.push(send.id);
  lead.history = lead.history || [];
  lead.history.push({ts:now(),text:`Materiais enviados via ${send.channel}: ${ids.map(materialName).join(', ')}.`});
  // If current stage has material checklist, mark it as completed.
  if(['aquecimento','cliente'].includes(lead.stage)){
    const materialTask=(TASKS[lead.stage]||[]).find(([id,label])=>id.includes('material')||label.toLowerCase().includes('material')||label.toLowerCase().includes('boas-vindas'));
    if(materialTask){
      lead.actions[lead.stage]=lead.actions[lead.stage]||{};
      lead.actions[lead.stage][materialTask[0]]={ts:now(),note:`Envio registrado via ${send.channel}: ${ids.map(materialName).join(', ')}`};
    }
  }
  save(); render(); setView('material-send'); toast('Envio de materiais registrado.');
}
function materialTaskDetails(l,taskId){
  const label=((TASKS[l.stage]||[]).find(t=>t[0]===taskId)||[])[1]||'';
  if(!(taskId.includes('material')||label.toLowerCase().includes('material')||label.toLowerCase().includes('book')||label.toLowerCase().includes('boas-vindas'))) return '';
  return `<div class="materialHistory"><b>Materiais enviados para este lead</b>${materialHistoryHtml(l.id,true)}</div>`;
}
actionControls = function(l,taskId){
  const b=[];
  const add=(label,fn,cls='')=>b.push(`<button class="btn small ${cls}" onclick="${fn}">${label}</button>`);
  const label=((TASKS[l.stage]||[]).find(t=>t[0]===taskId)||[])[1]||'';
  const materialRelated=taskId.includes('material')||label.toLowerCase().includes('material')||label.toLowerCase().includes('book')||label.toLowerCase().includes('boas-vindas');
  if(materialRelated) add('Enviar material',`openMaterialSendCenter('${l.id}')`,'contextActionPrimary');
  if(['simular','sim-exec','sim-ajuste','sim-valid','validar-aceite'].includes(taskId)) add('Abrir simulador',`openLeadSimulator('${l.id}')`,'contextActionPrimary');
  if(['apresentar-lotes','lote-escolhido','prio-lote'].includes(taskId)){ add('Abrir mapa',`goLotsForLead('${l.id}')`); add('Escolher/travar lote',`openLotPickerForLead('${l.id}')`,'contextActionPrimary'); }
  if(['emitir-proposta','prop-envio'].includes(taskId)) add('Simular e gerar proposta',`openLeadSimulator('${l.id}')`,'contextActionPrimary');
  if(['validar-alcada','prop-alcada'].includes(taskId)) add('Abrir propostas',`setView('proposals')`);
  if(['reservar-lote','prazo-reserva','reserva-lote'].includes(taskId)) add('Reservar lote',`openReserveLot('${l.lotId||''}','${l.id}')`,'contextActionPrimary');
  if(['docs-obrigatorios','contrato-cadastro','contrato-conjuge'].includes(taskId)) add('Abrir documentos',`openDossier('${l.id}','docs')`,'contextActionPrimary');
  if(['contrato-gerado','contrato-envio'].includes(taskId)) add('Abrir contratos',`setView('contracts')`);
  if(['boas-vindas','primeira-comunicacao','entrada-boasvindas','cart-checkin','cart-obra'].includes(taskId)) add('Registrar comunicação',`registerClientCommunicationFromLead('${l.id}','${taskId}')`,'contextActionPrimary');
  return b.length?`<div class="actionButtons">${b.join('')}</div>`:'';
};
dossierAction = function(l,miss){
  const tasks = TASKS[l.stage] || [];
  return `<div class="grid two" style="margin-top:14px">
    <div class="card">
      <h3>Checklist obrigatório da etapa</h3>
      <div class="checkGrid">${tasks.map(([id,label])=>{
        const done = actionDone(l,l.stage,id);
        const note = l.notesByStage?.[l.stage]?.[id] || '';
        return `<div class="checkCard ${done?'done':''}">
          <b>${esc(label)}</b>
          <div class="tiny">${done ? 'Concluído em '+fmtDateTime(l.actions[l.stage][id].ts) : 'Pendente'}</div>
          ${note ? `<div class="actionNotePreview">${esc(note)}</div>` : ''}
          ${materialTaskDetails(l,id)}
          ${actionControls(l,id)}
          <div class="primaryActions">
            <button class="btn small primary" onclick="registerAction('${l.id}','${id}')">Registrar ação</button>
            <button class="btn small" onclick="toggleStageNote('${l.id}','${id}')">Anotar</button>
          </div>
          <div id="note-wrap-${id}" style="display:${note?'block':'none'};margin-top:10px">
            <textarea id="note-${id}" placeholder="Anote detalhes específicos desta ação..." style="width:100%;min-height:86px;border:1px solid var(--line);border-radius:12px;padding:10px">${esc(note)}</textarea>
            <div class="actions" style="justify-content:flex-start;margin-top:8px"><button class="btn small" onclick="saveStageNote('${l.id}','${id}')">Salvar anotação</button></div>
          </div>
        </div>`;
      }).join('')}</div>
    </div>
    <div class="card">
      <h3>Avanço da etapa</h3>
      <div class="timeline">
        ${miss.length?`<div class="event"><b>Itens pendentes</b><span>${miss.map(x=>esc(x)).join(' · ')}</span></div>`:`<div class="event"><b>Checklist completo</b><span>A etapa já pode ser avançada.</span></div>`}
        <div class="event"><b>Próximo passo sugerido</b><span>${esc(nextBestAction(l))}</span></div>
        <div class="event"><b>Atalho operacional</b><span>Use os botões contextuais dentro de cada item para executar a ação certa.</span></div>
      </div>
      <div class="actions" style="justify-content:flex-start;margin-top:12px">
        <button class="btn primary" onclick="advanceLead('${l.id}')">Avançar etapa</button>
        <button class="btn" onclick="openDossier('${l.id}','simular')">Simular</button>
      </div>
    </div>
  </div>`;
};
function proposalReservationInfo(p){
  const lot=lotBy(p.lotId);
  const r=(state.reservations||[]).find(x=>x.lotId===p.lotId && x.leadId===p.leadId);
  if(!lot) return '<div class="proposalRichBox"><h3>Lote</h3><p>Lote não localizado.</p></div>';
  return `<div class="proposalRichBox"><h3>Lote selecionado e reserva</h3><p><b>${esc(lotLabel(lot.id))}</b> · ${lot.area} m² · ${esc(lot.type)} · ${esc(lot.sector)}<br><b>Preço:</b> ${fmtMoney(lot.price)} · <b>Status:</b> ${lotStatusLabel(lot.status)}<br><b>Topografia:</b> ${esc(lot.topography||'—')} · <b>Face:</b> ${esc(lot.face||'—')}<br><b>Reserva:</b> ${r?`${lotStatusLabel(r.status)} até ${fmtDateTime(r.expiresAt)}`:'Sem reserva registrada'}<br><b>Motivo:</b> ${esc(r?.reason||lot.reserveReason||'—')}</p><div class="actions" style="justify-content:flex-start;margin-top:10px"><button class="btn small" onclick="openLot('${lot.id}')">Abrir lote</button><button class="btn small" onclick="openReserveLot('${lot.id}','${p.leadId}')">Ajustar reserva</button></div></div>`;
}
function proposalFinancialInfo(p){
  const lot=lotBy(p.lotId);
  const entryTotal=(lot?.price||0)*((p.entry||10)/100);
  const inst=p.entryInstallments||1;
  const entryPart=p.entryInstallmentValue||entryTotal/inst;
  return `<div class="proposalRichBox"><h3>Condição comercial</h3><p><b>Entrada:</b> ${p.entry||10}% · ${inst===1?'à vista':`${inst}x de ${fmtMoney(entryPart)}`} · total ${fmtMoney(entryTotal)}<br><b>Mensais:</b> ${p.months}x ${fmtMoney(p.monthly)}<br><b>Anuais:</b> ${p.annuals}x ${fmtMoney(p.annual)}<br><b>Correção:</b> ${esc(p.index||'IPCA')} + ${p.interest||0.7}% a.m.<br><b>Total nominal:</b> ${fmtMoney(p.total)}</p></div>`;
}
function saveProposalNotes(id){
  const p=byId(state.proposals,id); if(!p) return;
  p.negotiationNotes=v('propNegotiationNotes');
  p.updatedAt=now();
  const l=leadBy(p.leadId);
  if(l){ l.history.push({ts:now(),text:'Observações de negociação da proposta atualizadas.'}); }
  save(); openProposal(id); toast('Observações da proposta salvas.');
}
openProposalModal = function(p){
  const l=leadBy(p.leadId); const lot=lotBy(p.lotId); if(!l||!lot) return;
  const approved=['aprovada','enviada','aceita','convertida'].includes(p.status);
  const sent=!!p.sentAt || ['enviada','aceita','convertida'].includes(p.status);
  const accepted=['aceita','convertida'].includes(p.status);
  const pend=contractPendencies(l);
  const approvalActions = !approved ? `<button class="btn primary" onclick="approveProposal('${p.id}')">Aprovar proposta</button>` : `<span class="pill green">Aprovada</span>`;
  const sendActions = approved ? `<button class="btn" onclick="printProposal('${p.id}')">Gerar PDF</button><button class="btn" onclick="sendProposalEmail('${p.id}')">Enviar e-mail</button><button class="btn" onclick="sendProposalWhatsApp('${p.id}')">Enviar WhatsApp</button><button class="btn" onclick="openProposalConfirmation('${p.id}')">Página de confirmação</button><button class="btn" onclick="markProposalSent('${p.id}')">Marcar enviado</button>` : `<span class="pill amber">Envio bloqueado até aprovação</span>`;
  const acceptAction = (approved||sent) && !accepted ? `<button class="btn success" onclick="acceptProposal('${p.id}')">Registrar aceite/confirm.</button>` : accepted ? `<span class="pill green">Aceite registrado</span>` : '<span class="pill">Aguardando aprovação/envio</span>';
  const contractAction = accepted ? `<button class="btn primary" onclick="createContract('${p.id}')">Gerar contrato</button>` : `<span class="pill amber">Contrato bloqueado até aceite</span>`;
  openModal('Aprovação da proposta · '+l.name,`Lote ${lotLabel(lot.id)} · ${fmtMoney(p.total)}`,`
    <div class="grid four"><div class="card" style="box-shadow:none"><h3>${fmtMoney(p.total)}</h3><p>Total nominal</p></div><div class="card" style="box-shadow:none"><h3>${fmtMoney(p.monthly)}</h3><p>Mensal</p></div><div class="card" style="box-shadow:none"><h3>${fmtMoney(p.annual)}</h3><p>Anual</p></div><div class="card" style="box-shadow:none"><h3>${esc(p.status)}</h3><p>Status</p></div></div>
    ${typeof proposalFlowHtml==='function'?proposalFlowHtml(p):''}
    <div class="proposalDetailGrid" style="margin-top:14px">
      <div class="proposalRichBox"><h3>Cliente e negociação</h3><p><b>Cliente:</b> ${esc(l.name)}<br><b>WhatsApp:</b> ${esc(l.phone||'—')}<br><b>E-mail:</b> ${esc(l.email||'—')}<br><b>Origem:</b> ${esc(l.source||'—')} · <b>Campanha:</b> ${esc(l.campaign||'—')}<br><b>Responsáveis:</b> SDR ${esc(person(l.sdrId))} · Corretor ${esc(person(l.brokerId))}</p></div>
      ${proposalReservationInfo(p)}
      ${proposalFinancialInfo(p)}
      <div class="proposalRichBox"><h3>Prontidão contratual</h3>${pend.length?`<p>Pendências: ${esc(pend.join(' · '))}</p>`:'<p>Cadastro apto para avançar ao contrato, sujeito à revisão jurídica.</p>'}</div>
    </div>
    <div class="negotiationBox"><h3>Observações da negociação</h3><textarea id="propNegotiationNotes" placeholder="Ex.: cliente pediu entrada em 6x, quer lote de esquina, depende de aprovação do cônjuge..." style="width:100%;min-height:110px;border:1px solid var(--line);border-radius:13px;padding:10px">${esc(p.negotiationNotes||'')}</textarea><div class="actions" style="justify-content:flex-start;margin-top:10px"><button class="btn" onclick="saveProposalNotes('${p.id}')">Salvar observações</button></div></div>
    <div class="approvalBanner"><strong>Fluxo correto</strong><span>1. Aprovação interna → 2. Envio ao cliente → 3. Confirmação/aceite → 4. Contrato.</span></div>
    <div class="card" style="box-shadow:none;margin-top:14px"><h3>1. Aprovação interna</h3><div class="proposalActions">${approvalActions}</div></div>
    <div class="card" style="box-shadow:none;margin-top:14px"><h3>2. Envio ao cliente</h3><div class="proposalActions">${sendActions}</div></div>
    <div class="card" style="box-shadow:none;margin-top:14px"><h3>3. Confirmação / aceite</h3><div class="proposalActions">${acceptAction}</div></div>
    <div class="card" style="box-shadow:none;margin-top:14px"><h3>4. Contrato</h3><div class="proposalActions">${contractAction}</div></div>
  `,'wide');
};
proposalPdfHtml = function(p){
  const l=leadBy(p.leadId), lot=lotBy(p.lotId);
  const inst=p.entryInstallments||1;
  const entryTotal=(lot?.price||0)*((p.entry||10)/100);
  const entryPart=p.entryInstallmentValue||entryTotal/inst;
  return `<!doctype html><html><head><meta charset="utf-8"><title>Proposta ${esc(l.name)}</title><style>body{font-family:Arial,sans-serif;color:#173C52;margin:36px}h1{font-size:26px}.box{border:1px solid #d8e2e8;border-radius:14px;padding:14px;margin:12px 0}.brand{display:flex;gap:12px;align-items:center}.brand img{height:44px}table{border-collapse:collapse;width:100%;margin-top:14px}td,th{border:1px solid #d8e2e8;padding:9px;text-align:left}th{background:#f3f7f9}button{padding:10px 14px;border:0;border-radius:10px;background:#245E82;color:white;font-weight:bold}.confirm{background:#F0FBE9;border:1px solid #C8EFA2;border-radius:14px;padding:14px;margin-top:16px}@media print{button{display:none}}

function materialSendPayload(status='manual_registrado'){
  ensureMaterialSendState(); ensureBackendState();
  const lead=leadBy(v('matLead'));
  const ids=[...document.querySelectorAll('.matCheck:checked')].map(x=>x.value);
  if(!lead) throw new Error('Selecione um lead/cliente.');
  if(!ids.length) throw new Error('Selecione pelo menos um material.');
  const sentAtVal=v('matSentAt');
  const sentAt=sentAtVal?new Date(sentAtVal).toISOString():now();
  const materials=ids.map(id=>materialById(id)).filter(Boolean);
  const message=`Olá ${lead.name}, seguem os materiais sobre o ${project().name}: ${materials.map(m=>m.name).join(', ')}. Posso te ajudar com uma simulação, escolha de lote ou próxima etapa?`;

    id:uid('mat-send'),leadId:lead.id,projectId:project().id,audience:v('matAudience')||'lead',materialIds:ids,channel:v('matChannel'),sentAt,byName:v('matBy')||((typeof authUser==='function'&&authUser()?.name)||'Equipe comercial'),note:v('matNote'),status,createdAt:now(),
    backendPayload:{recipient:{name:lead.name,phone:lead.phone,email:lead.email},channel:v('matChannel'),message,materials:materials.map(m=>({id:m.id,name:m.name,type:m.type||'',url:m.url||null})),leadId:lead.id,projectId:project().id}
  };

function registerMaterialSendRecord(send,queue=false){
  state.materialSends.push(send);
  const lead=leadBy(send.leadId);
  if(lead){
    lead.materialsSent=lead.materialsSent||[];
    lead.materialsSent.push(send.id);
    lead.history=lead.history||[];
    lead.history.push({ts:now(),text:`Materiais ${queue?'preparados para envio backend':'registrados como enviados'} via ${send.channel}: ${send.materialIds.map(materialName).join(', ')}.`});
    if(['aquecimento','cliente'].includes(lead.stage)){
      const materialTask=(TASKS[lead.stage]||[]).find(([id,label])=>id.includes('material')||label.toLowerCase().includes('material')||label.toLowerCase().includes('boas-vindas'));
      if(materialTask){
        lead.actions[lead.stage]=lead.actions[lead.stage]||{};
        lead.actions[lead.stage][materialTask[0]]={ts:now(),note:`Envio via ${send.channel}: ${send.materialIds.map(materialName).join(', ')}`};
      }
    }
  }
  if(queue) queueBackendTask('material.send',send.backendPayload);
  save();
}

function ensureFinanceState(){
  ensureBackendState();
  state.financeSettings = state.financeSettings || {costM2:650, defaultBillingChannel:'WhatsApp'};
  state.receivables = state.receivables || [];
  state.billingMessages = state.billingMessages || [];

function salePriceForProposal(p){
  const lot=lotBy(p.lotId);
  const base=lot?.price||p.price||0;
  return Math.max(0,base-(Number(p.discountAmount)||0));
}
function proposalDiscount(p){ return Number(p.discountAmount)||0; }
function receivableStatus(r){
  if(r.status==='recebido') return 'recebido';
  if(new Date(r.dueDate)<new Date()) return 'vencido';
  return r.status||'aberto';
}
function syncReceivables(){
  ensureFinanceState();
  const validStatuses=['aprovada','enviada','aceita','convertida','em-aprovacao'];
  projectProposals().filter(p=>validStatuses.includes(p.status)).forEach(p=>{
    const lot=lotBy(p.lotId); if(!lot) return;
    const already=state.receivables.some(r=>r.proposalId===p.id);
    if(already) return;
    const sale=salePriceForProposal(p);
    const entryTotal=sale*((p.entry||10)/100);
    const inst=Math.max(1,Math.min(6,Number(p.entryInstallments)||1));
    for(let i=1;i<=inst;i++){
      state.receivables.push({id:uid('rec'),projectId:project().id,proposalId:p.id,leadId:p.leadId,lotId:p.lotId,type:'entrada',number:i,totalNumbers:inst,dueDate:days(30*(i-1)),amount:entryTotal/inst,status:'aberto',createdAt:now()});
    }
    const monthlyCount=Math.min(Number(p.months)||0,60);
    for(let i=1;i<=monthlyCount;i++){
      state.receivables.push({id:uid('rec'),projectId:project().id,proposalId:p.id,leadId:p.leadId,lotId:p.lotId,type:'mensal',number:i,totalNumbers:Number(p.months)||0,dueDate:days(30*i),amount:Number(p.monthly)||0,status:'aberto',createdAt:now()});
    }
    const annualCount=Math.min(Number(p.annuals)||0,10);
    for(let i=1;i<=annualCount;i++){
      state.receivables.push({id:uid('rec'),projectId:project().id,proposalId:p.id,leadId:p.leadId,lotId:p.lotId,type:'anual',number:i,totalNumbers:Number(p.annuals)||0,dueDate:days(365*i),amount:Number(p.annual)||0,status:'aberto',createdAt:now()});
    }
  });
  save(); render(); toast('Carteira de recebíveis sincronizada.');
}
function projectReceivables(){ ensureFinanceState(); return state.receivables.filter(r=>r.projectId===project().id); }
function financeAnalytics(){
  ensureFinanceState();
  const rec=projectReceivables();
  const received=rec.filter(r=>receivableStatus(r)==='recebido').reduce((s,r)=>s+Number(r.amount||0),0);
  const open=rec.filter(r=>receivableStatus(r)==='aberto').reduce((s,r)=>s+Number(r.amount||0),0);
  const late=rec.filter(r=>receivableStatus(r)==='vencido').reduce((s,r)=>s+Number(r.amount||0),0);
  const baseLateOpen=open+late;
  const proposals=projectProposals();
  const sales=proposals.filter(p=>['aprovada','enviada','aceita','convertida'].includes(p.status));
  const totalSale=sales.reduce((s,p)=>s+salePriceForProposal(p),0);
  const totalArea=sales.reduce((s,p)=>s+(lotBy(p.lotId)?.area||0),0);
  const avgSale=sales.length?totalSale/sales.length:0;
  const avgM2=totalArea?totalSale/totalArea:0;
  const costM2=Number(state.financeSettings.costM2)||0;
  const marginM2=avgM2-costM2;
  const discountTotal=sales.reduce((s,p)=>s+proposalDiscount(p),0);
  const month=new Date().getMonth(), year=new Date().getFullYear();
  const discountMonth=sales.filter(p=>{const d=new Date(p.createdAt||now()); return d.getMonth()===month&&d.getFullYear()===year;}).reduce((s,p)=>s+proposalDiscount(p),0);
  return {rec,received,open,late,delinquency:baseLateOpen?late/baseLateOpen*100:0,proposals,sales,totalSale,totalArea,avgSale,avgM2,costM2,marginM2,discountTotal,discountMonth};
}

    </div>
    <div class="card">
      <h2>Parâmetros e integrações</h2>
      <div class="field"><label>Custo/m² atual</label><input id="finCostM2" type="number" value="${a.costM2}"></div>

  const s=receivableStatus(r);
  if(s==='recebido') return '<span class="statusPaid">Recebido</span>';
  if(s==='vencido') return '<span class="statusLate">Vencido</span>';

function receivableById(id){ return (state.receivables||[]).find(r=>r.id===id); }
function markReceivablePaid(id){
  const r=receivableById(id); if(!r) return;

function yyyyMMdd(date){
  const d=new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function endOfDay(dateStr){
  const d=new Date(dateStr+'T23:59:59');
  return d;
}
function startOfDay(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  return d;
}
function firstDayOfMonth(d=new Date()){ return yyyyMMdd(new Date(d.getFullYear(),d.getMonth(),1)); }
function lastDayOfMonth(d=new Date()){ return yyyyMMdd(new Date(d.getFullYear(),d.getMonth()+1,0)); }
function firstDayOfYear(d=new Date()){ return yyyyMMdd(new Date(d.getFullYear(),0,1)); }
function lastDayOfYear(d=new Date()){ return yyyyMMdd(new Date(d.getFullYear(),11,31)); }
function addDaysDate(n){ const d=new Date(); d.setDate(d.getDate()+n); return yyyyMMdd(d); }
function ensureFinancePeriod(){
  ensureFinanceState();
  state.financePeriod=state.financePeriod||{preset:'ano_atual',start:firstDayOfYear(),end:lastDayOfYear()};
  if(!state.financePeriod.start || !state.financePeriod.end){
    state.financePeriod.start=firstDayOfYear();
    state.financePeriod.end=lastDayOfYear();
  }
}
function periodObject(){
  ensureFinancePeriod();
  return {
    preset:state.financePeriod.preset||'personalizado',
    start:state.financePeriod.start,
    end:state.financePeriod.end,
    startDate:startOfDay(state.financePeriod.start),
    endDate:endOfDay(state.financePeriod.end)
  };
}
function inFinancePeriod(dateValue,period=periodObject()){
  if(!dateValue) return false;
  const d=new Date(dateValue);
  return d>=period.startDate && d<=period.endDate;
}
function setFinanceQuick(preset){
  ensureFinancePeriod();
  const today=new Date();
  let start=state.financePeriod.start, end=state.financePeriod.end;
  if(preset==='mes_atual'){ start=firstDayOfMonth(today); end=lastDayOfMonth(today); }
  if(preset==='proximos_90'){ start=yyyyMMdd(today); end=addDaysDate(90); }
  if(preset==='trimestre_atual'){
    const q=Math.floor(today.getMonth()/3);
    start=yyyyMMdd(new Date(today.getFullYear(),q*3,1));
    end=yyyyMMdd(new Date(today.getFullYear(),q*3+3,0));
  }
  if(preset==='ano_atual'){ start=firstDayOfYear(today); end=lastDayOfYear(today); }
  if(preset==='tudo'){ start='2000-01-01'; end='2099-12-31'; }
  state.financePeriod={preset,start,end};
  save(); render();
}
function applyFinancePeriod(){

function periodLabel(period=periodObject()){

function proposalDate(p){
  return p.acceptedAt || p.approvedAt || p.sentAt || p.createdAt || now();
}
function vgvMetrics(period=periodObject()){
  const lots=projectLots();
  const vgvProjected=lots.reduce((s,l)=>s+Number(l.price||0),0);
  const proposals=projectProposals();
  const realizedStatuses=['aceita','convertida'];
  const realizedAll=proposals.filter(p=>realizedStatuses.includes(p.status)).reduce((s,p)=>s+salePriceForProposal(p),0);
  const realizedPeriod=proposals.filter(p=>realizedStatuses.includes(p.status)&&inFinancePeriod(proposalDate(p),period)).reduce((s,p)=>s+salePriceForProposal(p),0);
  const contracted=projectContracts().filter(c=>c.signedAt).reduce((s,c)=>s+salePriceForProposal(byId(state.proposals,c.proposalId)||{}),0);
  const inPipeline=proposals.filter(p=>['em-aprovacao','aprovada','enviada'].includes(p.status)).reduce((s,p)=>s+salePriceForProposal(p),0);
  const soldLots=lots.filter(l=>['contrato','vendido'].includes(l.status)).length;
  return {vgvProjected,realizedAll,realizedPeriod,contracted,inPipeline,soldLots,progress:vgvProjected?realizedAll/vgvProjected*100:0};
}
function financeAnalytics(period=periodObject()){
  ensureFinanceState();
  const recAll=projectReceivables();
  const rec=recAll.filter(r=>inFinancePeriod(r.dueDate,period));
  const received=rec.filter(r=>receivableStatus(r)==='recebido').reduce((s,r)=>s+Number(r.amount||0),0);
  const open=rec.filter(r=>receivableStatus(r)==='aberto').reduce((s,r)=>s+Number(r.amount||0),0);
  const late=rec.filter(r=>receivableStatus(r)==='vencido').reduce((s,r)=>s+Number(r.amount||0),0);
  const baseLateOpen=open+late;
  const proposals=projectProposals();
  const sales=proposals.filter(p=>['aprovada','enviada','aceita','convertida'].includes(p.status)&&inFinancePeriod(proposalDate(p),period));
  const totalSale=sales.reduce((s,p)=>s+salePriceForProposal(p),0);
  const totalArea=sales.reduce((s,p)=>s+(lotBy(p.lotId)?.area||0),0);
  const avgSale=sales.length?totalSale/sales.length:0;
  const avgM2=totalArea?totalSale/totalArea:0;
  const costM2=Number(state.financeSettings.costM2)||0;
  const marginM2=avgM2-costM2;
  const discountPeriod=sales.reduce((s,p)=>s+proposalDiscount(p),0);
  const allSales=proposals.filter(p=>['aprovada','enviada','aceita','convertida'].includes(p.status));
  const discountTotal=allSales.reduce((s,p)=>s+proposalDiscount(p),0);
  const vgv=vgvMetrics(period);
  return {rec,recAll,received,open,late,delinquency:baseLateOpen?late/baseLateOpen*100:0,proposals,sales,totalSale,totalArea,avgSale,avgM2,costM2,marginM2,discountTotal,discountPeriod,vgv,period};
}
function cashFlowRows(period=periodObject()){
  const rowsMap={};
  projectReceivables().filter(r=>inFinancePeriod(r.dueDate,period)).forEach(r=>{
    const d=new Date(r.dueDate);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(2)}`;
    rowsMap[key]=rowsMap[key]||{key,label,previsto:0,recebido:0,vencido:0,aberto:0};
    const amount=Number(r.amount||0);
    rowsMap[key].previsto+=amount;
    const st=receivableStatus(r);
    if(st==='recebido') rowsMap[key].recebido+=amount;
    if(st==='vencido') rowsMap[key].vencido+=amount;
    if(st==='aberto') rowsMap[key].aberto+=amount;
  });
  return Object.values(rowsMap).sort((a,b)=>a.key.localeCompare(b.key));
}
function cashFlowSvg(rows){
  const max=Math.max(1,...rows.map(r=>r.previsto));
  const w=760, h=250, base=205, barW=Math.max(24,Math.min(54,Math.floor((w-70)/Math.max(1,rows.length))-12));

}

function slugLocal(value){
  return String(value||'campanha').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,48) || 'campanha';

function ensureCampaignState(){
  state.campaigns = state.campaigns || [];
  const existingNames = new Set(state.campaigns.map(c=>String(c.name||'').toLowerCase()));
  const projectId = project()?.id || state.selectedProjectId || 'proj-reserva';
  const leadCampaigns = [...new Set((state.leads||[]).map(l=>l.campaign).filter(Boolean))];
  if(!state.campaigns.length){
    const defaults = leadCampaigns.length ? leadCampaigns : ['Lista VIP','Represamento Pré-lançamento','Indicações de Clientes'];
    defaults.forEach((name,i)=>{
      state.campaigns.push({
        id:'camp-'+slugLocal(name),
        projectId,
        name,
        status:'ativa',
        objective:i===0?'Represamento':i===1?'Velocidade de vendas':'Indicação',
        channel:i===2?'Indicação':'Digital',
        startDate:firstDayOfMonth ? firstDayOfMonth() : new Date().toISOString().slice(0,10),
        endDate:lastDayOfMonth ? lastDayOfMonth() : new Date(new Date().getFullYear(),new Date().getMonth()+1,0).toISOString().slice(0,10),
        targetLeads:i===0?300:120,
        targetSales:i===0?80:30,
        targetVgv:i===0?projectLots().slice(0,80).reduce((s,l)=>s+Number(l.price||0),0):projectLots().slice(0,30).reduce((s,l)=>s+Number(l.price||0),0),
        budget:i===2?0:25000,
        materialIds:(state.materials||[]).slice(0,2).map(m=>m.id),
        condition:{entryPct:10,entryInstallments:i===0?6:3,months:180,annuals:15,interest:0.7,annualRatio:28.35,maxDiscountPct:i===0?3:0,notes:'Condição padrão vinculada à campanha.'},
        notes:'Campanha criada automaticamente a partir dos dados existentes.',
        createdAt:now(),updatedAt:now()
      });
    });
  } else {
    leadCampaigns.forEach(name=>{
      if(!existingNames.has(String(name).toLowerCase())){
        state.campaigns.push({id:'camp-'+slugLocal(name),projectId,name,status:'ativa',objective:'Geral',channel:'Não informado',startDate:firstDayOfMonth(),endDate:lastDayOfMonth(),targetLeads:0,targetSales:0,targetVgv:0,budget:0,materialIds:[],condition:{entryPct:10,entryInstallments:1,months:180,annuals:15,interest:0.7,annualRatio:28.35,maxDiscountPct:0,notes:''},notes:'Campanha importada dos leads.',createdAt:now(),updatedAt:now()});
      }
    });
  }
  const byName=Object.fromEntries(state.campaigns.map(c=>[String(c.name||'').toLowerCase(),c]));
  (state.leads||[]).forEach(l=>{
    if(!l.campaignId && l.campaign && byName[String(l.campaign).toLowerCase()]) l.campaignId=byName[String(l.campaign).toLowerCase()].id;
    if(l.campaignId && !l.campaign) l.campaign=campaignName(l.campaignId);
  });
}

  const soldLots=lots.filter(l=>['contrato','vendido'].includes(l.status)).length;

function campaignVgvComparisonSvg(c){
  const m = campaignMetrics(c);
  const projected = Number(c.targetVgv)||0;
  const realized = Number(m.vgvRealized)||0;
  const executed = Number(m.vgvExecuted)||0;
  const pipeline = Number(m.vgvPipeline)||0;
  const rows = [
    {label:'Meta / projetado', value:projected, color:'#245E82'},
    {label:'Em negociação', value:pipeline, color:'#F59E0B'},
    {label:'Realizado', value:realized, color:'#84C225'},
    {label:'Executado', value:executed, color:'#15803D'}
  ];
  const max = Math.max(1,...rows.map(r=>r.value));
  return `<svg viewBox="0 0 720 210" xmlns="http://www.w3.org/2000/svg">${rows.map((r,i)=>{const y=28+i*42; const w=Math.max(4,(r.value/max)*420); return `<text x="8" y="${y+18}" font-size="13" fill="#173C52">${esc(r.label)}</text><rect x="150" y="${y}" width="${w}" height="26" rx="8" fill="${r.color}"/><text x="${160+w}" y="${y+18}" font-size="13" fill="#173C52">${fmtMoney(r.value)}</text>`;}).join('')}</svg>`;
}
function campaignPeoplePerformance(c,type='sdr'){
  const m=campaignMetrics(c);
  const members=type==='sdr'?team('SDR'):team('Corretor');
  return members.map(member=>{
    const leads=m.leads.filter(l=>type==='sdr'?l.sdrId===member.id:l.brokerId===member.id);
    const ids=new Set(leads.map(l=>l.id));
    const props=m.props.filter(p=>ids.has(p.leadId));
    const reservations=m.reservations.filter(r=>ids.has(r.leadId));
    const contracts=m.contracts.filter(ct=>ids.has(ct.leadId));
    const vgvRealized=props.filter(p=>['aceita','convertida'].includes(p.status)).reduce((s,p)=>s+salePriceForProposal(p),0);
    const score=leads.length*1 + props.length*3 + reservations.length*4 + contracts.length*8 + vgvRealized/100000;
    return {member,leads,props,reservations,contracts,vgvRealized,score};
  }).filter(x=>x.leads.length||x.props.length||x.reservations.length||x.contracts.length).sort((a,b)=>b.score-a.score);
}
